<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kartu Pers Digital Tinta Informasi</title>
    
    <!-- Anti Pinch Zoom & Multi-touch Zoom Prevention for Mobile -->
    <script>
      document.addEventListener('gesturestart', function (e) {
        e.preventDefault();
      });
      document.addEventListener('touchstart', function (e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });
    </script>
    
    <!-- Open Graph / WhatsApp / Facebook Meta Tags -->
    <meta property="og:title" content="Kartu Pers Digital Tinta Informasi" />
    <meta property="og:description" content="Sistem Verifikasi Digital ID & Kartu Pers Resmi Media Tinta Informasi. Terverifikasi oleh JMSI." />
    <meta property="og:image" content="/favicon.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="300" />
    <meta property="og:image:height" content="300" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Kartu Pers Digital Tinta Informasi" />
    <meta name="twitter:description" content="Sistem Verifikasi Digital ID & Kartu Pers Resmi Media Tinta Informasi. Terverifikasi oleh JMSI." />
    <meta name="twitter:image" content="/favicon.jpg" />
  </head>

  </body>
</html>
